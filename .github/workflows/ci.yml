name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Vérification syntaxe et style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Vérification syntaxe Python (py_compile)
        run: |
          python -m compileall haufcode/ haufcode.py -q

      - name: Installation de Ruff
        run: pip install ruff

      - name: Lint avec Ruff
        run: ruff check haufcode/ haufcode.py

      - name: Vérification de l'absence de secrets hardcodés
        run: |
          # Vérifie qu'aucun token ou clé n'a été committé par erreur
          # Patterns : clés API OpenRouter (sk-or-...), tokens Telegram (chiffres:hash)
          if grep -rE "(sk-or-v1-[a-f0-9]{64}|[0-9]{8,10}:[A-Za-z0-9_-]{35})" haufcode/ haufcode.py; then
            echo "❌ Secret potentiel détecté dans le code source !"
            exit 1
          fi
          echo "✅ Aucun secret détecté."
